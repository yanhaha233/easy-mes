name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: easy_mes
          POSTGRES_PASSWORD: easy_mes
          POSTGRES_DB: easy_mes
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U easy_mes -d easy_mes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://easy_mes:easy_mes@127.0.0.1:15432/easy_mes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -e ".[dev]"

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Lint backend
        working-directory: backend
        run: ruff check app tests

      - name: Test backend
        working-directory: backend
        env:
          EASY_MES_RUN_INTEGRATION: "1"
        run: pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
