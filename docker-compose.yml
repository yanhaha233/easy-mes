services:
  postgres:
    image: postgres:16-alpine
    container_name: easy-mes-postgres
    environment:
      POSTGRES_DB: easy_mes
      POSTGRES_USER: easy_mes
      POSTGRES_PASSWORD: easy_mes
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easy_mes -d easy_mes"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: easy-mes-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
